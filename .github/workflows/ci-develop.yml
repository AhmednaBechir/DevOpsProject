name: CI Develop

on:
  push:
    branches:
      - develop

jobs:
  build-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test
        run: mvn verify
        working-directory: ndarray-lib
      - name: Upload Final Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-develop
          path: ndarray-lib/target/site/jacoco/