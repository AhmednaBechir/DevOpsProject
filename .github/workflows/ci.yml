name: CI

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test
        run: mvn verify
        working-directory: ndarray-lib
      - name: Upload Jacoco report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ndarray-lib/target/site/jacoco/